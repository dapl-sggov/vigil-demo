<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{--ink:#1D1D1F;--ink-2:#3A3A3C;--ink-3:#6E6E73;--ink-4:#8E8E93;--line:#E5E5EA;--bg:#FBFBFD;--bg2:#FFFFFF;--bg3:#F5F5F7;--bg4:#EEEEF1;--green:#0E7433;--green-dark:#0A5A28;--green-soft:#E6F0E9;--blue:#2B5683;--red:#D02117;--amber:#C08916;--tint-green:rgba(14,116,51,0.08);--tint-amber:rgba(192,137,22,0.10);--tint-red:rgba(208,33,23,0.08);--tint-blue:rgba(43,86,131,0.08);--sh-md:0 4px 12px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.04);--font:'Inter',-apple-system,Arial,sans-serif;--font-mono:'JetBrains Mono',Menlo,Consolas,monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:var(--font);font-size:14.5px;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;letter-spacing:-0.01em;line-height:1.5;}
strong,b{font-weight:600;}
.shell{max-width:1280px;margin:0 auto;padding:1.4rem 1.6rem 4rem;}
.brand{display:flex;align-items:center;gap:0.7rem;margin-bottom:0.95rem;padding-bottom:0.85rem;border-bottom:1px solid var(--line);}
.brand-mark{width:30px;height:30px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.brand-mark svg{width:18px;height:18px;}
.brand-bd{flex:1;}
.brand-nm{font-weight:700;font-size:1rem;letter-spacing:-0.015em;}
.brand-sub{font-size:0.72rem;color:var(--ink-3);}
.brand-link{font-size:0.72rem;color:var(--green);text-decoration:none;font-weight:500;margin-right:0.7rem;}
.brand-link:hover{text-decoration:underline;}
.user-chip{display:flex;align-items:center;gap:0.45rem;padding:0.3rem 0.55rem 0.3rem 0.35rem;background:var(--bg3);border:1px solid var(--line);border-radius:8px;}
.avatar-sm{width:24px;height:24px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.66rem;font-weight:600;}
.user-name-sm{font-size:0.72rem;font-weight:500;color:var(--ink-2);}

.classified-banner{background:repeating-linear-gradient(45deg,#FBEAE9,#FBEAE9 10px,#F8E0DE 10px,#F8E0DE 20px);border:2px solid var(--red);border-radius:10px;padding:0.85rem 1.1rem;margin-bottom:1.4rem;display:flex;align-items:center;gap:0.7rem;font-size:0.84rem;color:var(--red);font-weight:600;}
.classified-banner svg{width:20px;height:20px;flex-shrink:0;}

.access-denied{padding:3rem 2rem;text-align:center;background:var(--bg2);border:1px solid var(--line);border-radius:12px;}
.access-denied h2{font-size:1.3rem;margin-bottom:0.7rem;color:var(--red);}
.access-denied p{color:var(--ink-3);max-width:520px;margin:0 auto 1.5rem;line-height:1.55;}

.hero{padding:1rem 0 1.4rem;}
.hero-eye{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--red);font-weight:600;margin-bottom:0.4rem;}
.hero-h1{font-size:1.6rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:0.5rem;}
.hero-sub{font-size:0.92rem;color:var(--ink-3);max-width:760px;line-height:1.55;}

/* Risk dashboard */
.risk-dash{display:grid;grid-template-columns:repeat(4,1fr);gap:0.85rem;margin-bottom:1.5rem;}
.risk-card{padding:1rem 1.1rem;background:var(--bg2);border:1px solid var(--line);border-radius:10px;}
.risk-card.alert{background:var(--tint-red);border-color:var(--red);}
.risk-card-lb{font-size:0.66rem;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-4);font-weight:600;margin-bottom:0.5rem;}
.risk-card.alert .risk-card-lb{color:var(--red);}
.risk-card-vl{font-size:1.7rem;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-0.02em;}
.risk-card.alert .risk-card-vl{color:var(--red);}
.risk-card-dt{font-size:0.7rem;color:var(--ink-3);margin-top:0.45rem;}

/* List of contencioso */
.cases{display:flex;flex-direction:column;gap:0.7rem;}
.case{background:var(--bg2);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.case-h{padding:1rem 1.2rem;display:flex;gap:1rem;align-items:flex-start;cursor:pointer;}
.case-h:hover{background:var(--bg3);}
.case-status{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:0.4rem;}
.case-status.acordao{background:var(--red);}
.case-status.parecer{background:var(--amber);}
.case-status.notificacao{background:var(--blue);}
.case-status.dialogo{background:var(--ink-4);}
.case-bd{flex:1;}
.case-celex{font-family:var(--font-mono);font-size:0.74rem;color:var(--red);font-weight:600;margin-bottom:0.2rem;}
.case-ti{font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:0.3rem;line-height:1.3;}
.case-meta{font-size:0.74rem;color:var(--ink-3);}
.case-rt{display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem;}
.case-fase-pill{font-size:0.7rem;padding:0.25rem 0.6rem;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;}
.fase-acordao{background:var(--red);color:#fff;}
.fase-parecer{background:var(--tint-amber);color:var(--amber);}
.fase-notificacao{background:var(--tint-blue);color:var(--blue);}
.fase-dialogo{background:var(--bg4);color:var(--ink-3);}
.case-sancao{font-family:var(--font-mono);font-size:0.74rem;color:var(--red);font-weight:500;}
.case-arrow{align-self:center;color:var(--ink-4);transition:transform 0.18s;}
.case.open .case-arrow{transform:rotate(90deg);}

.case-body{display:none;padding:0 1.2rem 1.3rem;border-top:1px solid var(--line);}
.case.open .case-body{display:block;}

.section-h{font-size:0.74rem;font-weight:700;color:var(--ink);margin:1.3rem 0 0.7rem;text-transform:uppercase;letter-spacing:0.05em;display:flex;align-items:center;gap:0.5rem;}
.section-h::before{content:"";width:3px;height:14px;background:var(--red);border-radius:2px;}

/* 6-phase pipeline */
.pipeline{display:grid;grid-template-columns:repeat(6,1fr);gap:0.4rem;}
.phase{padding:0.65rem 0.7rem;background:var(--bg3);border-radius:6px;text-align:center;position:relative;}
.phase.done{background:var(--tint-green);}
.phase.cur{background:var(--red);color:#fff;}
.phase-n{font-size:0.6rem;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.04em;font-weight:600;margin-bottom:0.2rem;}
.phase.cur .phase-n{color:rgba(255,255,255,0.75);}
.phase.done .phase-n{color:var(--green);}
.phase-nm{font-size:0.72rem;font-weight:600;color:var(--ink);}
.phase.cur .phase-nm{color:#fff;}
.phase-dt{font-family:var(--font-mono);font-size:0.62rem;color:var(--ink-3);margin-top:0.25rem;}
.phase.cur .phase-dt{color:rgba(255,255,255,0.85);}

/* Pieces table */
.pieces{display:flex;flex-direction:column;gap:0.4rem;}
.piece{display:grid;grid-template-columns:90px 1fr 110px 100px 24px;gap:0.6rem;padding:0.55rem 0.75rem;background:var(--bg3);border-radius:6px;align-items:center;font-size:0.78rem;}
.piece-dt{font-family:var(--font-mono);font-size:0.7rem;color:var(--ink-3);}
.piece-ti{color:var(--ink);font-weight:500;}
.piece-cls{font-size:0.6rem;text-transform:uppercase;padding:0.15rem 0.45rem;border-radius:3px;font-weight:600;letter-spacing:0.04em;text-align:center;}
.cls-reservado{background:var(--tint-red);color:var(--red);}
.cls-publico{background:var(--tint-green);color:var(--green);}
.cls-confidencial{background:#FFEFD5;color:var(--red);}
.piece-hash{font-family:var(--font-mono);font-size:0.62rem;color:var(--ink-4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.piece-link{color:var(--green);text-decoration:none;display:flex;align-items:center;justify-content:center;}
.piece-link svg{width:14px;height:14px;}

/* Audit trail */
.audit{display:flex;flex-direction:column;gap:0.35rem;font-size:0.74rem;}
.audit-it{display:flex;gap:0.7rem;padding:0.45rem 0.7rem;background:var(--bg3);border-radius:5px;font-family:var(--font-mono);}
.audit-ts{color:var(--ink-3);min-width:120px;}
.audit-actor{color:var(--ink);font-weight:600;}
.audit-action{color:var(--ink-2);}

/* Cost calc */
.cost-row{display:grid;grid-template-columns:1fr 130px;gap:1rem;padding:0.55rem 0;font-size:0.84rem;border-bottom:1px solid var(--line);}
.cost-row:last-child{border-bottom:none;}
.cost-row.total{font-weight:700;font-size:0.95rem;color:var(--red);padding-top:0.95rem;border-top:2px solid var(--red);border-bottom:none;}

.brand-link{color:var(--green);}
@media (max-width:900px){.risk-dash{grid-template-columns:1fr 1fr;}.pipeline{grid-template-columns:repeat(2,1fr);}.piece{grid-template-columns:1fr;}}
</style>
</head>

          <div class="section-h">Pipeline de 6 fases</div>
          <div class="pipeline">
            ${c.pipeline.map((p, j) => `
              <div class="phase ${p.cls}">
                <div class="phase-n">FASE ${j+1}</div>
                <div class="phase-nm">${p.nm}</div>
                <div class="phase-dt">${p.dt}</div>
              </div>
            `).join('')}
          </div>

          <div class="section-h">Peças processuais (apenas metadados)</div>
          ${c.pieces.length > 0 ? `<div class="pieces">${c.pieces.map(p => `
            <div class="piece">
              <div class="piece-dt">${p.dt}</div>
              <div class="piece-ti">${p.ti}</div>
              <div class="piece-cls cls-${p.cls}">${p.cls}</div>
              <div class="piece-hash">${p.hash}</div>
              <a href="#" class="piece-link" onclick="event.preventDefault(); openExternal('${c.id}','${p.ti}')" title="Abrir nos sistemas DGDEI">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              </a>
            </div>
          `).join('')}</div>` : '<div style="padding:0.7rem;color:var(--ink-4);font-style:italic;font-size:0.78rem">Sem peças registadas no VIGIL.</div>'}

          <div class="section-h">Cálculo de risco financeiro</div>
          ${c.cost.map(co => `<div class="cost-row ${co.total ? 'total' : ''}"><span>${co.lb}</span><span style="text-align:right;font-family:var(--font-mono)">${co.vl}</span></div>`).join('')}

          <div class="section-h">Auditoria · acessos recentes</div>
          ${c.audit.length > 0 ? `<div class="audit">${c.audit.map(a => `
            <div class="audit-it">
              <span class="audit-ts">${a.ts}</span>
              <span class="audit-actor">${a.actor}</span>
              <span class="audit-action">→ ${a.action}</span>
            </div>
          `).join('')}</div>` : '<div style="padding:0.7rem;color:var(--ink-4);font-style:italic;font-size:0.78rem">Sem acessos registados no período.</div>'}

          <div style="margin-top:1.2rem;display:flex;gap:0.55rem;flex-wrap:wrap">
            <button onclick="alert('Acção registada em audit_log: notify_dgdei')" style="padding:0.5rem 1rem;background:var(--red);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:0.78rem;font-weight:600;cursor:pointer">Notificar DGDEI</button>
            <button onclick="alert('Briefing PDF gerado · classificado Reservado')" style="padding:0.5rem 1rem;background:var(--bg2);color:var(--ink-2);border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:0.78rem;cursor:pointer">Exportar briefing (Reservado)</button>
            <a href="RADAR.html" style="padding:0.5rem 1rem;background:var(--bg2);color:var(--ink-2);border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:0.78rem;text-decoration:none;display:inline-flex;align-items:center;gap:0.3rem">← Ver no RADAR</a>
          </div>
        </div>
      </div>
    `).join('')}
  </div>
`;

}

function openExternal(caseId, piece) {
  alert(`Abertura externa:\n\nSistema DGDEI · processo ${caseId}\nPeça: ${piece}\n\n(Mock — em produção abriria o sistema seguro DGDEI)\n\n✓ Acesso registado em audit_log`);
}
</script>

</body>
</html>
